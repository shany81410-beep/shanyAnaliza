<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משיכת נתוני מניות - פלטפורמה פיננסית</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        finance: {
                            dark: '#0f172a', // Slate 900
                            primary: '#1e3a8a', // Blue 900
                            accent: '#3b82f6', // Blue 500
                            light: '#f8fafc', // Slate 50
                            border: '#cbd5e1' // Slate 300
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-finance-light text-finance-dark font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8 border border-finance-border">
        
        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-finance-primary mb-2">דוח מניות היסטורי</h1>
            <p class="text-sm text-slate-500">הזן סימולים כדי לייצר גיליון נתונים מאוחד</p>
        </div>

        <form id="stockForm" class="space-y-5">
            
            <div>
                <label for="tickers" class="block text-sm font-semibold mb-1">סימולי מניות (מופרדים בפסיק)</label>
                <input type="text" id="tickers" name="tickers" placeholder="לדוגמה: AAPL, MSFT, TSLA" required
                    class="w-full px-4 py-2 border border-finance-border rounded-lg focus:ring-2 focus:ring-finance-accent focus:border-finance-accent outline-none transition-all dir-ltr text-left uppercase">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="startDate" class="block text-sm font-semibold mb-1">תאריך התחלה</label>
                    <input type="date" id="startDate" name="startDate" required
                        class="w-full px-4 py-2 border border-finance-border rounded-lg focus:ring-2 focus:ring-finance-accent outline-none">
                </div>

                <div>
                    <label for="endDate" class="block text-sm font-semibold mb-1">תאריך סיום</label>
                    <input type="date" id="endDate" name="endDate" required
                        class="w-full px-4 py-2 border border-finance-border rounded-lg focus:ring-2 focus:ring-finance-accent outline-none">
                </div>
            </div>

            <div>
                <label for="frequency" class="block text-sm font-semibold mb-1">תדירות נתונים</label>
                <select id="frequency" name="frequency" required
                    class="w-full px-4 py-2 border border-finance-border rounded-lg focus:ring-2 focus:ring-finance-accent outline-none bg-white">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full bg-finance-primary hover:bg-blue-800 text-white font-bold py-3 rounded-lg shadow-md transition-colors flex justify-center items-center gap-2 mt-4">
                <span id="btnText">הפק דוח נתונים</span>
                <svg id="loadingIcon" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div id="resultContainer" class="hidden mt-8 pt-6 border-t border-finance-border text-center">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-green-100 mb-4">
                <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-lg font-bold text-finance-dark mb-1">הנתונים נמשכו בהצלחה!</h3>
            <p class="text-sm text-slate-500 mb-6">גיליון הנתונים שלך מוכן וממתין ב-Google Sheets.</p>
            
            <a id="sheetLink" href="#" target="_blank" rel="noopener noreferrer"
                class="inline-block w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md transition-colors text-decoration-none">
                פתח גיליון מניות
            </a>
        </div>

        <div id="errorContainer" class="hidden mt-4 p-3 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm text-center">
            </div>

    </div>

    <script>
        // יש להחליף את הכתובת הזו ב-URL שקיבלת מהפריסה של Google Apps Script
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwnafgc82XnhnNnRQBH4SaNRwQ2ws35gTBvT8FmRXs/dev';

        const form = document.getElementById('stockForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');
        const resultContainer = document.getElementById('resultContainer');
        const sheetLink = document.getElementById('sheetLink');
        const errorContainer = document.getElementById('errorContainer');

        // קביעת תאריך ברירת מחדל (היום ושנה אחורה)
        const today = new Date();
        const lastYear = new Date(new Date().setFullYear(today.getFullYear() - 1));
        document.getElementById('endDate').valueAsDate = today;
        document.getElementById('startDate').valueAsDate = lastYear;

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // מניעת רענון הדף בעת שליחת הטופס

            // 1. איסוף הנתונים מהטופס
            const rawTickers = document.getElementById('tickers').value;
            // ניקוי רווחים והפיכה לאותיות גדולות, הפיכה למערך
            const tickersArray = rawTickers.split(',').map(t => t.trim().toUpperCase()).filter(t => t !== '');
            
            const payload = {
                tickers: tickersArray,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            // 2. עדכון מצב UI ל"טוען"
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.textContent = 'טוען נתונים...';
            loadingIcon.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');

            try {
                // 3. שליחת הבקשה לשרת ה-GAS
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    // שימוש ב-text/plain כדי למנוע בקשת OPTIONS מוקדמת (Preflight) שגוגל חוסמת לעיתים
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error('שגיאת רשת בגישה לשרת.');
                }

                const data = await response.json();

                // 4. טיפול בתשובה
                if (data.status === 'success') {
                    // הכל עבד כשורה
                    sheetLink.href = data.sheetUrl;
                    resultContainer.classList.remove('hidden');
                    form.reset(); // איפוס הטופס להזנה הבאה
                } else {
                    // השרת החזיר הודעת שגיאה (למשל, בעיה במשיכת טיקר)
                    throw new Error(data.message || 'אירעה שגיאה בעיבוד הנתונים בשרת.');
                }

            } catch (error) {
                console.error('Error:', error);
                errorContainer.textContent = error.message || 'אירעה שגיאה בלתי צפויה. נסה שוב מאוחר יותר.';
                errorContainer.classList.remove('hidden');
            } finally {
                // 5. החזרת הכפתור למצב רגיל בכל מקרה (הצלחה או שגיאה)
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.textContent = 'הפק דוח נתונים';
                loadingIcon.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
