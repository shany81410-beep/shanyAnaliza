<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משיכת נתוני מניות מ-Yahoo Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        finance: {
                            blue: '#0f172a',
                            slate: '#475569',
                            light: '#f8fafc',
                            accent: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .ltr-input { direction: ltr; text-align: left; }
    </style>
</head>
<body class="bg-finance-light text-finance-blue min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
        <h1 class="text-2xl font-bold mb-2 text-center text-finance-blue">דוח מניות - Yahoo Finance</h1>
        <p class="text-sm text-finance-slate mb-6 text-center">הזן את פרטי המניות ליצירת גיליון נתונים מאוחד</p>

        <form id="stockForm" class="space-y-4">
            <div>
                <label for="tickers" class="block text-sm font-medium mb-1">סימולי מניות (מופרדים בפסיק)</label>
                <input type="text" id="tickers" placeholder="TSLA, AAPL, AMZN" required
                    class="ltr-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-finance-accent outline-none">
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label for="startDate" class="block text-sm font-medium mb-1">תאריך התחלה</label>
                    <input type="date" id="startDate" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-finance-accent outline-none">
                </div>
                <div class="w-1/2">
                    <label for="endDate" class="block text-sm font-medium mb-1">תאריך סיום</label>
                    <input type="date" id="endDate" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-finance-accent outline-none">
                </div>
            </div>

            <div>
                <label for="frequency" class="block text-sm font-medium mb-1">תדירות</label>
                <select id="frequency" required
                    class="ltr-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-finance-accent outline-none">
                    <option value="1d">Daily (יומי)</option>
                    <option value="1wk">Weekly (שבועי)</option>
                    <option value="1mo">Monthly (חודשי)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full mt-4 bg-finance-blue hover:bg-finance-slate text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center">
                <span id="btnText">צור דוח מניות</span>
            </button>
        </form>

        <div id="errorMsg" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center"></div>

        <div id="successArea" class="hidden mt-6 text-center border-t border-gray-100 pt-6">
            <h2 class="text-lg font-semibold text-green-600 mb-4">הגיליון נוצר בהצלחה!</h2>
            <a id="sheetLink" href="#" target="_blank"
                class="inline-block w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md">
                פתח את הגיליון ב-Google Sheets
            </a>
        </div>
    </div>

    <script>
        // כתובת השרת האמיתית שלך:
        const WEB_APP_URL = 'https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMXmNA2M6ZG9ROrNgzyjMYAq8OCri0wBkROGYVaJ1P6q27aRpse8D5R0uRjf9S0ROVCT4t5zaUvV1mqo6NFA1IPvjioG2JwEEuCpJurX_9hOVUVdxn8XV7W4sy0QXlPd0ABV6VzGxF68llLveVR4zMbpVfyPbO8b3gVQh1CbhVi18MIHF79QcDg9ayqqfrdKwZWYTOYka9LCMLnNVMfwyrDcuo7BCm9vXGI0qQF1EEG7GlxMaXE&lib=M4jtejugDs1zSgmOmEZcHu-glDXMNhJyl';

        const form = document.getElementById('stockForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const successArea = document.getElementById('successArea');
        const sheetLink = document.getElementById('sheetLink');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            errorMsg.classList.add('hidden');
            successArea.classList.add('hidden');

            const tickersRaw = document.getElementById('tickers').value;
            const tickersArray = tickersRaw.split(',').map(ticker => ticker.trim().toUpperCase()).filter(t => t);

            const payload = {
                tickers: tickersArray,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            btnText.textContent = "טוען נתונים...";
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (data.sheetUrl) {
                    sheetLink.href = data.sheetUrl;
                    successArea.classList.remove('hidden');
                    form.reset(); 
                } else {
                    throw new Error(data.message || "השרת לא החזיר URL.");
                }
            } catch (error) {
                errorMsg.textContent = "אירעה שגיאה: " + error.message;
                errorMsg.classList.remove('hidden');
            } finally {
                btnText.textContent = "צור דוח מניות";
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
